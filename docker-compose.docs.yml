services:
  docs:
    image: maiagent_ai_django_local_docs
    container_name: maiagent_ai_django_local_docs
    build:
      context: .
      dockerfile: ./compose/local/docs/Dockerfile
    env_file:
      - ./.envs/.local/.django
    volumes:
      - /app/.venv
      - ./docs:/docs:z
      - ./config:/app/config:z
      - ./maiagent_ai_django:/app/maiagent_ai_django:z
    ports:
      - '9000:9000'
    command: /start-docs
